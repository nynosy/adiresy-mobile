name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Write local.properties
        run: |
          cat >> local.properties <<EOF
          adiresy.api.key=${{ secrets.ADIRESY_API_KEY }}
          release.keystore.path=release.keystore
          release.keystore.password=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release.key.alias=${{ secrets.RELEASE_KEY_ALIAS }}
          release.key.password=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify tag matches app version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          gradle_version=$(grep -m1 'versionName = "' app/build.gradle.kts | sed -E 's/.*versionName = "(.*)".*/\1/')
          if [ "$tag_version" != "$gradle_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match versionName '$gradle_version' in app/build.gradle.kts"
            exit 1
          fi

      - name: Build signed release APKs
        run: ./gradlew assembleRelease

      - name: Remove keystore
        if: always()
        run: rm -f release.keystore

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            app/build/outputs/apk/release/*.apk \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
