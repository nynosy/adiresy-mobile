name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Write local.properties
        run: |
          cat >> local.properties <<EOF
          release.keystore.path=release.keystore
          release.keystore.password=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release.key.alias=${{ secrets.RELEASE_KEY_ALIAS }}
          release.key.password=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release APKs
        run: ./gradlew assembleRelease

      - name: Remove keystore
        if: always()
        run: rm -f release.keystore

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            app/build/outputs/apk/release/*.apk \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
